name: Python CI

on:
  push:
    branches: [main]
    paths:
      - 'quant-core/python/**'
      - 'mortgage-proofs/src/**'
      - 'mortgage-proofs/tests/**'
      - 'mortgage-proofs/lean/**'
      - 'mortgage-proofs/pyproject.toml'
  pull_request:
    branches: [main]

concurrency:
  group: python-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quant-core-python:
    name: quant-core Python
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        working-directory: quant-core/python
        run: uv sync --extra dev

      - name: Test
        working-directory: quant-core/python
        run: uv run pytest -q --cov=src --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: quant-core/python/coverage.xml
          flags: quant-core
        continue-on-error: true

      - name: Type check
        working-directory: quant-core/python
        run: uv run mypy src/ --strict

      - name: Lint
        working-directory: quant-core/python
        run: uv run ruff check src/ tests/

  mortgage-python:
    name: mortgage-proofs Python
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache Lake packages
        uses: actions/cache@v4
        with:
          path: mortgage-proofs/lean/.lake
          key: lean-mortgage-${{ runner.os }}-${{ hashFiles('mortgage-proofs/lean/lean-toolchain') }}
          restore-keys: lean-mortgage-${{ runner.os }}-

      - name: Build Lean verifier
        working-directory: mortgage-proofs/lean
        run: lake build

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        working-directory: mortgage-proofs
        run: uv sync --all-extras

      - name: Test
        working-directory: mortgage-proofs
        run: uv run pytest -m "not integration" -q --cov=src --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: mortgage-proofs/coverage.xml
          flags: mortgage-proofs
        continue-on-error: true

      - name: Type check
        working-directory: mortgage-proofs
        run: uv run mypy src/ --strict

      - name: Lint
        working-directory: mortgage-proofs
        run: uv run ruff check src/ tests/
