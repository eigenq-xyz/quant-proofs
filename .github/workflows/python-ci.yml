name: Python CI

on:
  push:
    branches: [main]
    paths:
      - 'quant-core/python/**'
      - 'backtest-proofs/python/**'
      - 'backtest-proofs/lean/**'
      - 'mortgage-proofs/src/**'
      - 'mortgage-proofs/tests/**'
      - 'mortgage-proofs/lean/**'
      - 'mortgage-proofs/pyproject.toml'
  pull_request:
    branches: [main]

concurrency:
  group: python-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # quant-core runs on ubuntu — pure Python, no FFI
  quant-core-python:
    name: quant-core Python
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        working-directory: quant-core/python
        run: uv sync --extra dev

      - name: Run tests with coverage
        working-directory: quant-core/python
        run: uv run pytest -q --cov=src --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: quant-core/python/coverage.xml
          flags: quant-core
        continue-on-error: true

      - name: Type check
        working-directory: quant-core/python
        run: uv run mypy src/ --strict

      - name: Lint
        working-directory: quant-core/python
        run: uv run ruff check src/ tests/

  # backtest-proofs runs on macOS — libuv + Cython FFI requires a matching platform
  backtest-python:
    name: backtest-proofs Python
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: brew install libuv

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache Lean toolchain and packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            backtest-proofs/lean/.lake
          key: lean-backtest-${{ runner.os }}-${{ hashFiles('backtest-proofs/lean/lean-toolchain') }}
          restore-keys: lean-backtest-${{ runner.os }}-

      - name: Fetch mathlib binary cache
        working-directory: backtest-proofs/lean
        run: lake exe cache get || echo "Cache miss — building from source"

      - name: Build Lean kernel
        working-directory: backtest-proofs/lean
        run: lake build

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        working-directory: backtest-proofs/python
        run: uv sync --extra dev

      - name: Build Cython FFI extension
        working-directory: backtest-proofs/python
        run: uv run python setup_ffi.py build_ext --inplace

      - name: Run tests with coverage
        working-directory: backtest-proofs/python
        run: uv run pytest -q --cov=src --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backtest-proofs/python/coverage.xml
          flags: backtest-proofs
        continue-on-error: true

      - name: Type check
        working-directory: backtest-proofs/python
        run: uv run mypy src/ --strict

      - name: Lint
        working-directory: backtest-proofs/python
        run: uv run ruff check src/ tests/

  # mortgage-proofs runs on ubuntu — no native FFI dependency
  mortgage-python:
    name: mortgage-proofs Python
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache Lean toolchain and packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            mortgage-proofs/lean/.lake
          key: lean-mortgage-${{ runner.os }}-${{ hashFiles('mortgage-proofs/lean/lean-toolchain') }}
          restore-keys: lean-mortgage-${{ runner.os }}-

      - name: Build Lean verifier
        working-directory: mortgage-proofs/lean
        run: lake build

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        working-directory: mortgage-proofs
        run: uv sync --all-extras

      - name: Run unit tests with coverage
        working-directory: mortgage-proofs
        run: uv run pytest -m "not integration" -q --cov=src --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: mortgage-proofs/coverage.xml
          flags: mortgage-proofs
        continue-on-error: true

      - name: Type check
        working-directory: mortgage-proofs
        run: uv run mypy src/ --strict

      - name: Lint
        working-directory: mortgage-proofs
        run: uv run ruff check src/ tests/
