name: Python CI

on:
  push:
    branches: [main]
    paths:
      - 'foundations/quant-core/python/**'
      - 'extensions/mortgage-proofs/src/**'
      - 'extensions/mortgage-proofs/tests/**'
      - 'extensions/mortgage-proofs/lean/**'
      - 'extensions/mortgage-proofs/pyproject.toml'
      - 'foundations/portfolio-proofs/lean_pgd.py'
      - 'foundations/portfolio-proofs/lean_pgd_direct.py'
      - 'foundations/portfolio-proofs/tests/**'
      - 'foundations/portfolio-proofs/pyproject.toml'
  pull_request:
    branches: [main]

concurrency:
  group: python-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quant-core-python:
    name: quant-core Python
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        working-directory: foundations/quant-core/python
        run: uv sync --extra dev

      - name: Test
        working-directory: foundations/quant-core/python
        run: uv run pytest -q --cov=src --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          files: foundations/quant-core/python/coverage.xml
          flags: quant-core
        continue-on-error: true

      - name: Type check
        working-directory: foundations/quant-core/python
        run: uv run mypy src/ --strict

      - name: Lint
        working-directory: foundations/quant-core/python
        run: uv run ruff check src/ tests/

  mortgage-python:
    name: mortgage-proofs Python
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache Lake packages
        uses: actions/cache@v5
        with:
          path: extensions/mortgage-proofs/lean/.lake
          key: lean-mortgage-${{ runner.os }}-${{ hashFiles('extensions/mortgage-proofs/lean/lean-toolchain') }}
          restore-keys: lean-mortgage-${{ runner.os }}-

      - name: Build Lean verifier
        working-directory: extensions/mortgage-proofs/lean
        run: lake build

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        working-directory: extensions/mortgage-proofs
        run: uv sync --all-extras

      - name: Test
        working-directory: extensions/mortgage-proofs
        run: uv run pytest -m "not integration" -q --cov=src --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          files: extensions/mortgage-proofs/coverage.xml
          flags: mortgage-proofs
        continue-on-error: true

      - name: Type check
        working-directory: extensions/mortgage-proofs
        run: uv run mypy src/ --strict

      - name: Lint
        working-directory: extensions/mortgage-proofs
        run: uv run ruff check src/ tests/

  portfolio-python:
    name: portfolio-proofs Python
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        working-directory: foundations/portfolio-proofs
        run: uv sync --extra dev

      - name: Type check
        working-directory: foundations/portfolio-proofs
        run: uv run mypy lean_pgd.py lean_pgd_direct.py tests/ --strict

      - name: Lint
        working-directory: foundations/portfolio-proofs
        run: uv run ruff check lean_pgd.py lean_pgd_direct.py tests/

      - name: Docstring coverage
        working-directory: foundations/portfolio-proofs
        run: uv run interrogate lean_pgd.py lean_pgd_direct.py

      - name: Theorem cross-reference check
        run: python3 .github/scripts/check_theorem_refs.py foundations/portfolio-proofs/lean_pgd.py

      - name: Test (unit only — integration tests require pgd_solve binary)
        working-directory: foundations/portfolio-proofs
        # Integration tests are skipped automatically via @requires_binary
        # when the binary is absent; --cov collects what runs in CI.
        run: uv run pytest tests/ -q --cov=. --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          files: foundations/portfolio-proofs/coverage.xml
          flags: portfolio-proofs
        continue-on-error: true
