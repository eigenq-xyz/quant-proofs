name: Paper staleness check

# Runs on PRs that touch the QMD source. Verifies that the committed
# rendered PDF artifact has been updated alongside the QMD. Prevents
# drift between source and published PDF. The paper is distributed
# as PDF only; no HTML output is generated.

on:
  pull_request:
    paths:
      - 'reports/backtest-proofs.qmd'
      - 'reports/_quarto.yml'
      - 'reports/_eigenq.tex'
      - 'reports/_references.bib'

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify rendered PDF updated alongside QMD
        run: |
          # If the QMD changed in this PR, the committed PDF must also have changed.
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          qmd_changed=$(git diff --name-only "$BASE" "$HEAD" -- \
            reports/backtest-proofs.qmd reports/_quarto.yml reports/_eigenq.tex 2>/dev/null | wc -l)
          pdf_changed=$(git diff --name-only "$BASE" "$HEAD" -- \
            reports/backtest-proofs.pdf 2>/dev/null | wc -l)

          if [ "$qmd_changed" -gt 0 ] && [ "$pdf_changed" -eq 0 ]; then
            echo "::error::QMD/config changed but rendered PDF was not updated."
            echo "::error::Run 'make paper' from backtest-proofs/ and commit the"
            echo "::error::resulting reports/backtest-proofs.pdf and backtest-proofs_files/."
            exit 1
          fi

          echo "✓ QMD changed: $qmd_changed file(s); PDF changed: $pdf_changed file(s)"
