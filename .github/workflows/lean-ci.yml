name: Lean CI

on:
  push:
    branches: [main]
    paths:
      - 'foundations/quant-core/lean/**'
      - 'foundations/ftap-proofs/**'
      - 'foundations/options-proofs/**'
      - 'extensions/mortgage-proofs/lean/**'
      - 'extensions/hedge-proofs/**'
      - 'extensions/vrp-proofs/**'
      - 'research-pipeline/lean/**'
  pull_request:
    branches: [main]

concurrency:
  group: lean-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lean-build:
    name: ${{ matrix.subdir }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - subdir: quant-core
            lean-dir: foundations/quant-core/lean
          - subdir: ftap-proofs
            lean-dir: foundations/ftap-proofs
          - subdir: options-proofs
            lean-dir: foundations/options-proofs
            dep-lake: foundations/quant-core/lean/.lake
          - subdir: mortgage-proofs
            lean-dir: extensions/mortgage-proofs/lean
          - subdir: hedge-proofs
            lean-dir: extensions/hedge-proofs
            dep-lake: foundations/quant-core/lean/.lake
          - subdir: vrp-proofs
            lean-dir: extensions/vrp-proofs
            dep-lake: foundations/options-proofs/.lake
          - subdir: research-pipeline
            lean-dir: research-pipeline/lean
            dep-lake: foundations/ftap-proofs/.lake

    steps:
      - uses: actions/checkout@v7

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache Lake packages
        uses: actions/cache@v5
        with:
          path: |
            ${{ matrix.lean-dir }}/.lake
            ${{ matrix.dep-lake }}
          key: lean-${{ matrix.subdir }}-${{ runner.os }}-${{ hashFiles(format('{0}/lake-manifest.json', matrix.lean-dir)) }}
          restore-keys: lean-${{ matrix.subdir }}-${{ runner.os }}-

      - name: Fetch mathlib cache
        working-directory: ${{ matrix.lean-dir }}
        run: lake exe cache get || echo "Cache miss — building from source"

      - name: Build
        working-directory: ${{ matrix.lean-dir }}
        run: lake build

      - name: Check zero sorry
        run: |
          count=$(grep -rn '\bsorry\b' --include="*.lean" --exclude-dir=.lake \
                    "${{ matrix.lean-dir }}/" \
                  | grep -v '^\s*--' | wc -l | tr -d ' ')
          if [ "$count" -gt 0 ]; then
            echo "FAIL: $count sorry term(s) found:"
            grep -rn '\bsorry\b' --include="*.lean" --exclude-dir=.lake \
              "${{ matrix.lean-dir }}/" | grep -v '^\s*--'
            exit 1
          fi
          echo "PASS: zero sorry in ${{ matrix.subdir }}"
