name: Lean CI

on:
  push:
    branches: [main]
    paths:
      - 'quant-core/lean/**'
      - 'backtest-proofs/lean/**'
      - 'ftap-proofs/**'
      - 'options-proofs/**'
      - 'mortgage-proofs/lean/**'
  pull_request:
    branches: [main]

concurrency:
  group: lean-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lean-build:
    name: ${{ matrix.subdir }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - subdir: quant-core
            lean-dir: quant-core/lean
          - subdir: backtest-proofs
            lean-dir: backtest-proofs/lean
            dep-lake: quant-core/lean/.lake
          - subdir: ftap-proofs
            lean-dir: ftap-proofs
          - subdir: options-proofs
            lean-dir: options-proofs
            dep-lake: quant-core/lean/.lake
          - subdir: mortgage-proofs
            lean-dir: mortgage-proofs/lean

    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache Lake packages
        id: lean-cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ matrix.lean-dir }}/.lake
            ${{ matrix.dep-lake }}
          key: lean-${{ matrix.subdir }}-${{ runner.os }}-${{ hashFiles(format('{0}/lake-manifest.json', matrix.lean-dir)) }}
          restore-keys: lean-${{ matrix.subdir }}-${{ runner.os }}-

      # Lake v4.30+ auto-invokes the cache tool inside `lake build` when .lake/packages
      # is absent, and exits 1 on hash mismatch instead of falling back to source.
      # Running cache get here first (even on failure) sets up .lake/packages so that
      # the subsequent lake build skips the auto-fetch and compiles from source cleanly.
      # Skip entirely when the GH Actions cache already provides a warm .lake.
      - name: Fetch mathlib cache
        if: steps.lean-cache.outputs.cache-hit != 'true'
        working-directory: ${{ matrix.lean-dir }}
        run: lake exe cache get || true

      - name: Build
        working-directory: ${{ matrix.lean-dir }}
        run: lake build

      - name: Check zero sorry
        run: |
          count=$(grep -rn '\bsorry\b' --include="*.lean" --exclude-dir=.lake \
                    "${{ matrix.lean-dir }}/" \
                  | grep -v '^\s*--' | wc -l | tr -d ' ')
          if [ "$count" -gt 0 ]; then
            echo "FAIL: $count sorry term(s) found:"
            grep -rn '\bsorry\b' --include="*.lean" --exclude-dir=.lake \
              "${{ matrix.lean-dir }}/" | grep -v '^\s*--'
            exit 1
          fi
          echo "PASS: zero sorry in ${{ matrix.subdir }}"
