name: Publish Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'backtest-proofs/docs/**'
      - 'backtest-proofs/notebooks/**'
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install docs dependencies
        working-directory: backtest-proofs/python
        run: uv sync --extra docs

      # Build the root overview book (deploys to /)
      - name: Build root JupyterBook
        working-directory: backtest-proofs/python
        run: uv run jupyter-book build ../../docs/

      # Build the backtest-proofs detailed book (deploys to /backtest-proofs/)
      - name: Build backtest-proofs JupyterBook
        working-directory: backtest-proofs/python
        run: uv run jupyter-book build ../../backtest-proofs/docs/

      # Embed backtest-proofs book inside the root artifact
      - name: Merge backtest-proofs build into root site
        run: |
          mkdir -p docs/_build/html/backtest-proofs
          cp -r backtest-proofs/docs/_build/html/. docs/_build/html/backtest-proofs/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
