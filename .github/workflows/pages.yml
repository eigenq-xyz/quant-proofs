name: Publish Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'backtest-proofs/docs/**'
      - 'backtest-proofs/notebooks/**'
      - 'reports/**'
      - 'README.md'
      - '*/README.md'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Quarto + TinyTeX
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install JupyterBook (for /backtest-proofs/ docs site only)
        working-directory: backtest-proofs/python
        run: uv sync --extra docs

      # Future: build Lean API docs with doc-gen4
      # - name: Build Lean API docs (backtest-proofs)
      #   working-directory: backtest-proofs/lean
      #   run: lake build && lake exe doc-gen4

      # Build the root overview book (deploys to /)
      - name: Build root JupyterBook
        working-directory: backtest-proofs/python
        run: uv run jupyter-book build ../../docs/

      # Build the backtest-proofs detailed book (deploys to /backtest-proofs/)
      - name: Build backtest-proofs JupyterBook
        working-directory: backtest-proofs/python
        run: uv run jupyter-book build ../../backtest-proofs/docs/

      # Verify committed paper artifacts exist.
      # The paper is rendered locally and committed to reports/ (PDF and
      # the backtest-proofs_files/ asset bundle) because CI cannot execute the
      # paper chunks: it would require building Lean+Cython FFI and installing
      # WRDS data. The locally-rendered output is the source of truth.
      # The paper is distributed as PDF only; no HTML output is generated.
      - name: Verify committed paper artifacts
        run: |
          test -f reports/backtest-proofs.pdf || (echo "ERROR: PDF missing" && exit 1)
          test -d reports/backtest-proofs_files || (echo "ERROR: _files dir missing" && exit 1)
          echo "Paper PDF: $(wc -c < reports/backtest-proofs.pdf) bytes"

      # Embed backtest-proofs book inside the root artifact
      - name: Merge backtest-proofs build into root site
        run: |
          mkdir -p docs/_build/html/backtest-proofs
          cp -r backtest-proofs/docs/_build/html/. docs/_build/html/backtest-proofs/

      # Deploy paper under /paper/ — copy the committed PDF.
      - name: Copy paper to Pages artifact
        run: |
          mkdir -p docs/_build/html/paper
          cp reports/backtest-proofs.pdf docs/_build/html/paper/

      - name: Deployment summary
        run: |
          echo "### Pages deployment summary" >> $GITHUB_STEP_SUMMARY
          echo "| Asset | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Paper PDF | $(wc -c < reports/backtest-proofs.pdf) bytes |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Published at: https://eigenq-xyz.github.io/quant-proofs/" >> $GITHUB_STEP_SUMMARY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
