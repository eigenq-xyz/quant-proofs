name: Publish Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'backtest-proofs/docs/**'
      - 'backtest-proofs/notebooks/**'
      - 'reports/**'
      - 'README.md'
      - '*/README.md'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Quarto + TinyTeX
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install docs + research dependencies (jupyter-book, matplotlib, QuantLib)
        working-directory: backtest-proofs/python
        run: uv sync --extra docs --group dev --group research

      # Future: build Lean API docs with doc-gen4
      # - name: Build Lean API docs (backtest-proofs)
      #   working-directory: backtest-proofs/lean
      #   run: lake build && lake exe doc-gen4

      # Build the root overview book (deploys to /)
      - name: Build root JupyterBook
        working-directory: backtest-proofs/python
        run: uv run jupyter-book build ../../docs/

      # Build the backtest-proofs detailed book (deploys to /backtest-proofs/)
      - name: Build backtest-proofs JupyterBook
        working-directory: backtest-proofs/python
        run: uv run jupyter-book build ../../backtest-proofs/docs/

      # Render backtest-proofs paper (HTML + PDF) with fresh execution.
      # We DON'T use --no-execute because Quarto's freeze cache does not
      # preserve figure cross-reference metadata in a form the `--no-execute`
      # render can resolve (see Pages run 26308687233 for "Unable to resolve
      # crossref @fig-*" warnings). Fresh execution with research deps installed
      # guarantees all 12 figures render and all @fig-* refs resolve.
      # WRDS-gated chunks skip gracefully when data is absent (WRDS_PRESENT).
      - name: Render backtest-proofs paper (HTML + PDF)
        working-directory: backtest-proofs/python
        run: uv run quarto render ../../reports/backtest-proofs.qmd

      - name: Verify paper rendered
        run: |
          test -f reports/_output/backtest-proofs.pdf || (echo "ERROR: PDF not generated" && exit 1)
          test -f reports/_output/backtest-proofs.html || (echo "ERROR: HTML not generated" && exit 1)
          echo "Paper rendered: $(wc -c < reports/_output/backtest-proofs.pdf) bytes PDF"

      # Embed backtest-proofs book inside the root artifact
      - name: Merge backtest-proofs build into root site
        run: |
          mkdir -p docs/_build/html/backtest-proofs
          cp -r backtest-proofs/docs/_build/html/. docs/_build/html/backtest-proofs/

      # Deploy paper under /paper/ — both PDF and HTML rendered fresh by CI.
      - name: Copy paper to Pages artifact
        run: |
          mkdir -p docs/_build/html/paper
          cp reports/_output/backtest-proofs.pdf docs/_build/html/paper/
          cp reports/_output/backtest-proofs.html docs/_build/html/paper/
          cp -r reports/_output/backtest-proofs_files docs/_build/html/paper/

      - name: Deployment summary
        run: |
          echo "### Pages deployment summary" >> $GITHUB_STEP_SUMMARY
          echo "| Asset | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Paper PDF | $(wc -c < reports/_output/backtest-proofs.pdf) bytes |" >> $GITHUB_STEP_SUMMARY
          echo "| Paper HTML | $(wc -c < reports/_output/backtest-proofs.html) bytes |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Published at: https://eigenq-xyz.github.io/quant-proofs/" >> $GITHUB_STEP_SUMMARY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
