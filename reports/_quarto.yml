project:
  type: default
  output-dir: _output
  post-render:
    - ./post-render.sh

format:
  pdf:
    pdf-engine: xelatex
    documentclass: scrartcl
    classoption:
      - DIV=12
      - numbers=noendperiod
    papersize: letter
    fontfamily: libertinus
    fontsize: 11pt
    linestretch: 1.1
    geometry:
      - top=1.25in
      - bottom=1.25in
      - left=1.25in
      - right=1.25in
    colorlinks: true
    linkcolor: NavyBlue
    urlcolor: NavyBlue
    link-citations: true
    number-sections: true
    toc: true
    toc-depth: 2
    toc-title: "Contents"
    include-in-header:
      - _eigenq.tex
      - text: |
          \usepackage{titlesec}
          \usepackage{needspace}
          \usepackage{fvextra}
          % Force each top-level \section to start on a new page,
          % while keeping \subsection / \subsubsection inline.
          \let\quantproofsoldsection\section
          \renewcommand{\section}{\clearpage\quantproofsoldsection}
          \titleformat{\section}{\large\bfseries}{\thesection}{1em}{}
          \titleformat{\subsection}{\normalsize\bfseries}{\thesubsection}{1em}{}
          \titleformat{\subsubsection}{\normalsize\itshape}{\thesubsubsection}{1em}{}
          \setlength{\parskip}{4pt}
          \DefineVerbatimEnvironment{Highlighting}{Verbatim}{breaklines,breakanywhere,commandchars=\\\{\}}
    keep-tex: true
    fig-pos: "tbp"
    fig-cap-location: bottom
    tbl-cap-location: top

bibliography: _references.bib
csl: _journal-of-finance.csl
cite-method: citeproc

execute:
  echo: true
  warning: false
  freeze: auto

crossref:
  thm-title: Theorem
  lem-title: Lemma
  cor-title: Corollary
  prp-title: Proposition
  def-title: Definition
  exm-title: Example
