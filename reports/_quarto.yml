project:
  type: default
  output-dir: _output
  post-render:
    - ./post-render.sh

format:
  pdf:
    pdf-engine: xelatex
    documentclass: scrartcl
    classoption:
      - DIV=12
      - numbers=noendperiod
    papersize: letter
    fontfamily: libertinus
    fontsize: 11pt
    linestretch: 1.1
    geometry:
      - top=1.25in
      - bottom=1.25in
      - left=1.25in
      - right=1.25in
    colorlinks: true
    linkcolor: NavyBlue
    urlcolor: NavyBlue
    link-citations: true
    number-sections: true
    toc: false
    include-in-header:
      - _eigenq.tex
      - text: |
          \usepackage{titlesec}
          \newcommand{\sectionbreak}{\clearpage}
          \titleformat{\section}{\large\bfseries}{\thesection}{1em}{}
          \titleformat{\subsection}{\normalsize\bfseries}{\thesubsection}{1em}{}
          \titleformat{\subsubsection}{\normalsize\itshape}{\thesubsubsection}{1em}{}
          \setlength{\parskip}{4pt}
    keep-tex: true
    fig-pos: "tbp"
    fig-cap-location: bottom
    tbl-cap-location: top

  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    number-sections: true
    code-fold: false
    fig-cap-location: bottom
    tbl-cap-location: top
    html-math-method: katex

bibliography: _references.bib
csl: _journal-of-finance.csl
cite-method: citeproc

execute:
  echo: true
  warning: false
  freeze: auto

crossref:
  thm-title: Theorem
  lem-title: Lemma
  cor-title: Corollary
  prp-title: Proposition
  def-title: Definition
  exm-title: Example
