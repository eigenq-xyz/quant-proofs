title: "quant-proofs"
author: "eigenq-xyz"
logo: ""
execute:
  execute_notebooks: "off"
parse:
  myst_enable_extensions:
    - colon_fence
    - deflist
html:
  home_page_in_navbar: true
  use_edit_page_button: true
  use_issues_button: true
  use_repository_button: true
  navbar_number_sections: false
repository:
  url: https://github.com/eigenq-xyz/quant-proofs
  branch: main
  path_to_book: docs
sphinx:
  extra_extensions:
    - sphinx.ext.autodoc
  config:
    html_theme: quantecon_book_theme
    html_show_sourcelink: false
    myst_heading_anchors: 4
    html_theme_options:
      header_organisation_url: "https://github.com/eigenq-xyz"
      header_organisation: "EigenQ Research"
      nb_repository_url: "https://github.com/eigenq-xyz/quant-proofs"
      nb_branch: "main"
      # Disable launch buttons — no Binder/Colab/JupyterHub for this repo
      launch_buttons:
        colab_url: ""
        binderhub_url: ""
        jupyterhub_url: ""
