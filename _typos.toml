# typos configuration for quant-proofs.
#
# Extend-words: domain-specific identifiers that typos would otherwise flag.
# These are Lean 4 hypothesis names, codespell ignore-list abbreviations that
# also appear in prose, and mathematical abbreviations.

[default.extend-words]
# Lean 4 hypothesis name convention: h + relation abbreviation.
hge = "hge"

# Codespell ignore-list entries that also appear in config comments.
# All are intentional short-form tokens, not misspellings.
nd  = "nd"   # "nd" in --ignore-words-list (abbreviation)
ot  = "ot"   # "ot" in --ignore-words-list
fo  = "fo"   # "fo" in --ignore-words-list
ba  = "ba"   # "ba" in --ignore-words-list
te  = "te"   # "te" in --ignore-words-list
lst = "lst"  # "lst" in --ignore-words-list
ans = "ans"  # "ans" in --ignore-words-list
nin = "nin"  # "nin" in --ignore-words-list
ser = "ser"  # "ser" in --ignore-words-list

# Ken French 10-Industry Portfolio standard abbreviations.
Enrgy = "Enrgy"  # "Energy" industry short label
Durbl = "Durbl"  # "Durables" industry short label
