name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: brew install libuv

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache Lake packages
        uses: actions/cache@v4
        with:
          path: lean/.lake
          key: ${{ runner.os }}-lean-${{ hashFiles('lean/lake-manifest.json') }}
          restore-keys: |
            ${{ runner.os }}-lean-

      - name: Build Lean project
        run: |
          cd lean
          lake build

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.15"
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          cd python
          uv sync --extra dev

      - name: Build Cython FFI extension
        run: |
          cd python
          uv run python setup.py build_ext --inplace

      - name: Run tests
        run: |
          cd python
          uv run pytest -v --cov --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./python/coverage.xml
          flags: python

      - name: Run type checking
        run: |
          cd python
          uv run mypy src/verified_options_backtest

      - name: Run linting
        run: |
          cd python
          uv run ruff check src tests
