# Pre-commit hooks for quant-proofs monorepo.
#
# Setup (one-time, per local checkout):
#   uv pip install pre-commit
#   pre-commit install
#
# Run manually on all files:
#   pre-commit run --all-files
#
# Skip in CI runs (pre-commit.ci) where the build tools aren't available;
# these are run by the per-project GitHub Actions workflows instead.
ci:
  skip:
    - mypy-quant-core
    - mypy-mortgage-proofs
    - mypy-portfolio-proofs
    - lean-sorry-check
    - lean-import-order
    - interrogate-portfolio
    - theorem-refs

# Exclude archived work from all hooks — archive/ is read-only history
exclude: ^archive/

repos:
  # ─── General file-level hygiene ──────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=2000"]
      - id: check-merge-conflict
      - id: mixed-line-ending

  # ─── Python lint + format (all subprojects) ──────────────────────────────
  # Ruff config lives in each subproject's pyproject.toml; the hook runs
  # against any Python file in the monorepo so a commit can't merge if any
  # subdir's lint rules are violated.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ─── Markdown linting ────────────────────────────────────────────────────
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.37.0
    hooks:
      - id: markdownlint
        args: [--fix, --disable, MD013, MD033, MD041]

  # ─── Spell checking ──────────────────────────────────────────────────────
  # Two passes with different dictionaries; both are fast and complement each
  # other (codespell has a broader corpus, typos has better domain-word handling).
  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        # Ignore: "manu" (manual), "nd" (and), "ot" (of the), "fo" (for),
        # "ba" (base), "te" (the), "lst" (list), "ans" (answer),
        # "nin" (nine), "ser" (series).  Financial abbreviations and Lean
        # names will not be flagged because they are not English words.
        args:
          - --ignore-words-list=manu,nd,ot,fo,ba,te,lst,ans,nin,ser
          - --skip=*.lock,*.parquet,*.so,*.c,*.json
        types_or: [python, markdown, rst, lean, text]

  - repo: https://github.com/crate-ci/typos
    rev: v1.28.4
    hooks:
      - id: typos
        # typos has built-in understanding of common false-positives in code
        # (e.g. "uint", "precompile").  --force-exclude skips binary formats.
        args: [--force-exclude]
        exclude: '(\.lock|\.parquet|\.so|\.c|\.json|uv\.lock)$'

  # ─── Lean 4 checks ───────────────────────────────────────────────────────
  # Skipped in CI (pre-commit.ci) — CI runs lake build which is more thorough.
  # Runs locally to catch mistakes before pushing.
  - repo: local
    hooks:
      - id: lean-sorry-check
        name: Lean zero-sorry
        language: system
        entry: >-
          bash -c
          'found=$(grep -n "\bsorry\b" "$@" | grep -v "^\s*--");
          if [ -n "$found" ]; then echo "sorry found -- $found"; exit 1; fi'
        files: \.lean$
        exclude: "(^archive/|\\.lake/)"
        pass_filenames: true

      - id: lean-import-order
        name: Lean import ordering
        language: system
        entry: python3 .github/scripts/lean_import_order.py
        files: \.lean$
        exclude: "(^archive/|\\.lake/)"
        pass_filenames: true

  # ─── Prose + docstring quality ───────────────────────────────────────────
  # interrogate checks that all public-facing Python functions have docstrings.
  # Skipped in CI (pre-commit.ci) — run explicitly in portfolio-proofs CI job.
  - repo: local
    hooks:
      - id: interrogate-portfolio
        name: docstring coverage (portfolio-proofs)
        language: system
        entry: bash -c 'cd portfolio-proofs && uv run interrogate lean_pgd.py lean_pgd_direct.py'
        files: ^portfolio-proofs/(lean_pgd|lean_pgd_direct)\.py$
        pass_filenames: false

  # ─── Theorem cross-reference check ───────────────────────────────────────
  # Verifies that any Lean theorem name cited in a Python docstring as
  # "guaranteed by theorem `X`" actually exists in the Lean source tree.
  # Skipped in CI (pre-commit.ci) — run explicitly in portfolio-proofs CI job.
  - repo: local
    hooks:
      - id: theorem-refs
        name: Lean theorem cross-references
        language: system
        entry: python3 .github/scripts/check_theorem_refs.py
        files: ^portfolio-proofs/.*\.py$
        exclude: "(^archive/|scenarios/|tests/)"
        pass_filenames: true

  # ─── Per-subproject mypy (strict) ────────────────────────────────────────
  # mypy is run per subproject so each gets its own venv and stub set.
  # Each hook fires only when files under its subproject's python/ tree
  # have changed.
  - repo: local
    hooks:
      - id: mypy-quant-core
        name: mypy --strict (quant-core)
        entry: bash -c 'cd quant-core/python && uv run mypy src/ --strict'
        language: system
        files: ^quant-core/python/src/.*\.py$
        pass_filenames: false

      - id: mypy-mortgage-proofs
        name: mypy --strict (mortgage-proofs)
        entry: bash -c 'cd mortgage-proofs && uv run mypy src/ --strict'
        language: system
        files: ^mortgage-proofs/src/.*\.py$
        pass_filenames: false

      - id: mypy-portfolio-proofs
        name: mypy --strict (portfolio-proofs)
        entry: bash -c 'cd portfolio-proofs && uv run mypy lean_pgd.py lean_pgd_direct.py tests/ --strict'
        language: system
        files: ^portfolio-proofs/(lean_pgd|lean_pgd_direct|tests/).*\.py$
        pass_filenames: false
