services:
  minio:
    image: minio/minio:latest
    container_name: quant-proofs-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console (http://localhost:9001)
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-quantproofs}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-quantproofs123}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  minio-data:
